services:
  supply-stress-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: supply-chain-stress-api:1.0.0
    container_name: supply-chain-stress-api
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      MODELS_DIR: /app/models
      MAX_INPUT_ROWS: "100000"
      LOG_LEVEL: INFO
    volumes:
      - ./models:/app/models:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, os; port = os.getenv('PORT', '8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/ready', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
