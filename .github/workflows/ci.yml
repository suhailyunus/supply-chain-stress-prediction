name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python source
        run: python -m compileall -q api src frontend tests

      - name: Run API tests
        run: python -m pytest

  container-smoke-test:
    name: Build and smoke-test containers
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build and start services
        run: docker compose up --build --detach

      - name: Wait for API readiness
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ready > /dev/null; then
              echo "API is ready."
              exit 0
            fi
            echo "Waiting for API (${attempt}/30)..."
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Verify Streamlit health
        run: curl --fail --silent --retry 12 --retry-delay 5 http://127.0.0.1:8501/_stcore/health

      - name: Show service status
        if: always()
        run: docker compose ps

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop services
        if: always()
        run: docker compose down --volumes --remove-orphans
